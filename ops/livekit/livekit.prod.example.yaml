# Шаблон прод-конфига LiveKit. Скопируй и заполни секреты:
#   cp ops/livekit/livekit.prod.example.yaml ops/livekit/livekit.prod.yaml
#
# livekit.prod.yaml в .gitignore — реальные ключи не коммитим.
#
# ВАЖНО: ключ/секрет здесь и LIVEKIT_API_KEY / LIVEKIT_API_SECRET в .env
# должны совпадать. Секрет — минимум 32 символа: openssl rand -hex 32

port: 7880
bind_addresses:
  - ""

rtc:
  tcp_port: 7881
  # ICE/UDP-mux: один UDP-порт на все медиа-сессии вместо диапазона
  # 50000-50100 — рекомендованный prod-сетап LiveKit, проще для файрвола.
  # Порт уже проброшен в docker-compose.prod.yml (7882/udp).
  udp_port: 7882
  # На VPS LiveKit сам определяет публичный IP через STUN и рекламирует его
  # в ICE-кандидатах. Без этого клиенты получат недостижимый docker-IP.
  use_external_ip: true

# REPLACE: тот же ключ → LIVEKIT_API_KEY, тот же секрет → LIVEKIT_API_SECRET
keys:
  kdprod: "REPLACE_WITH_openssl_rand_hex_32"

log_level: info

# Webhook'и летят в speedy по внутренней docker-сети kd-net.
# api_key — имя ключа из `keys` выше.
webhook:
  api_key: kdprod
  urls:
    - http://speedy:3001/api/internal/livekit-webhook

room:
  auto_create: true
  empty_timeout: 300
  max_participants: 25

# TURN-реле: страховочный путь для участников за симметричным NAT / строгим
# файрволом, когда прямое P2P/ICE не собирается. Без него у части друзей
# голос и демо «рассыпаются» или не подключаются вовсе.
#
#   • udp_port 3478  — обычный TURN/UDP, закрывает основной кейс домашних роутеров.
#   • tls_port 5349  — TURNS (TURN-over-TLS): проходит даже там, где режут UDP
#                       и не-443 TCP. Серт переиспользуем тот, что Caddy уже
#                       выписал для KD_DOMAIN — его data-volume смонтирован в
#                       контейнер livekit как /caddy-certs:ro (docker-compose.prod.yml).
#
# ВАЖНО (см. docs/DEPLOY.md §3a — пошагово):
#   1. domain ДОЛЖЕН совпадать с KD_DOMAIN — под него выписан серт.
#   2. Путь cert_file/key_file включает имя ACME-директории CA. Для Let's Encrypt
#      prod это acme-v02.api.letsencrypt.org-directory. Проверь фактический путь:
#        docker compose -f docker-compose.app.yml exec caddy ls \
#          /data/caddy/certificates/
#   3. Серт появляется ТОЛЬКО после того, как Caddy его выпустит (app-плоскость).
#      Порядок старта: prod up → app up (Caddy берёт серт) → restart kd-livekit.
#   4. Caddy продлевает серт ~раз в 60 дней; LiveKit читает файл на старте и сам
#      НЕ перечитывает → после продления нужен `docker restart kd-livekit`
#      (опциональный weekly-cron — в docs/DEPLOY.md §3a).
turn:
  enabled: true
  domain: kakdela.example.com
  udp_port: 3478
  # ── TURNS/TLS (5349) — ВКЛЮЧИТЬ ВТОРЫМ ШАГОМ ──
  # Раскомментируй tls_port + cert_file + key_file ТОЛЬКО после того, как Caddy
  # выписал серт для KD_DOMAIN (app-плоскость поднята), затем `restart livekit`.
  # Почему не сразу: на первом `prod up` серта ещё нет, а LiveKit с указанным,
  # но отсутствующим cert_file не стартует (крэш-луп). До этого шага работает
  # TURN/UDP (3478) + TCP-fallback 7881 — этого хватает почти всем. Пошагово —
  # docs/DEPLOY.md §3a.
  # tls_port: 5349
  # external_tls: false
  # cert_file: /caddy-certs/caddy/certificates/acme-v02.api.letsencrypt.org-directory/kakdela.example.com/kakdela.example.com.crt
  # key_file: /caddy-certs/caddy/certificates/acme-v02.api.letsencrypt.org-directory/kakdela.example.com/kakdela.example.com.key

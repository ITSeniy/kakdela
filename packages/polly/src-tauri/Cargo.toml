[package]
name = "kakdela-polly"
version = "0.6.8"
description = "КакДела desktop client"
authors = ["you"]
edition = "2021"
rust-version = "1.77"

# main.rs / lib.rs
[lib]
name = "kakdela_polly_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
# `tray-icon` нужен для системного трея — это feature, а не отдельный плагин.
tauri = { version = "2", features = ["tray-icon", "image-png"] }
tauri-plugin-os = "2"
tauri-plugin-shell = "2"
tauri-plugin-notification = "2"
# Глобальные хоткеи (мут/деафен при свёрнутом окне) — desktop only.
tauri-plugin-global-shortcut = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Секретные чаты (T-101): официальное Rust-ядро Signal. В v0.96.4 это PQXDH
# (post-quantum X3DH: classic X25519 + Kyber1024) + Double Ratchet. Не на
# crates.io — пин на git-тег. Обновлять осознанно (security-критично).
libsignal-protocol = { git = "https://github.com/signalapp/libsignal", tag = "v0.96.4" }
# rand 0.9 — ОБЯЗАТЕЛЬНО та же мажорная версия, что и у libsignal (rand_core 0.9):
# message_encrypt<R: Rng + CryptoRng> требует трейты именно этой версии.
rand = "0.9"
# Шифрование локального стора сессий/ключей at-rest (DEK; см. crypto/store.rs).
aes-gcm = "0.10"
# Трейты стора libsignal объявлены через async_trait — наши impl'ы тоже.
async-trait = "0.1"
# Синхронный драйвер для ?Send async-трейтов стора libsignal (futures без I/O —
# резолвятся за один poll). Дешевле, чем тащить tokio в крипто-путь.
pollster = "0.4"
base64 = "0.22"

# Десктоп-плагины: один экземпляр (повторный запуск фокусирует окно) и
# автозапуск при входе в систему. Мобильным сборкам не нужны.
[target.'cfg(not(any(target_os = "android", target_os = "ios")))'.dependencies]
tauri-plugin-single-instance = "2"
tauri-plugin-autostart = "2"

# Свой клик-обработчик нативных тостов на Windows: плагин на desktop активацию
# в JS не пробрасывает (notify-rust `.show()` без on_activated). Версия совпадает
# с той, что тащит notify-rust транзитивно.
[target.'cfg(windows)'.dependencies]
tauri-winrt-notification = "0.7"
# WASAPI loopback-захват звука (T-094 Stage A/B). Версия совпадает с той, что
# уже в дереве зависимостей (windows 0.61.x) — чтобы не тащить вторую копию.
windows = { version = "0.61", features = [
    "Win32_Foundation",
    "Win32_Security",                      # SECURITY_ATTRIBUTES (в сигнатуре CreateEventW)
    "Win32_System_Com",
    "Win32_System_Com_StructuredStorage",  # PROPVARIANT (process-loopback params)
    "Win32_System_Variant",                # VT_BLOB
    "Win32_System_Threading",              # CreateEventW / WaitForSingleObject / SetEvent
    "Win32_System_Diagnostics_ToolHelp",   # список процессов для пикера
    "Win32_Media_Audio",
] }
# `#[implement]` (COM completion handler для ActivateAudioInterfaceAsync) генерит
# пути `windows_core::...`, поэтому крейт должен быть доступен под этим именем.
# Версия совпадает с той, что тянет windows 0.61.x.
windows-core = "0.61"

[features]
custom-protocol = ["tauri/custom-protocol"]

[package]
name = "kakdela-polly"
version = "0.0.1"
description = "КакДела desktop client"
authors = ["you"]
edition = "2021"
rust-version = "1.77"

# main.rs / lib.rs
[lib]
name = "kakdela_polly_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
# `tray-icon` нужен для системного трея — это feature, а не отдельный плагин.
tauri = { version = "2", features = ["tray-icon", "image-png"] }
tauri-plugin-os = "2"
tauri-plugin-shell = "2"
tauri-plugin-notification = "2"
# Глобальные хоткеи (мут/деафен при свёрнутом окне) — desktop only.
tauri-plugin-global-shortcut = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Секретные чаты (T-101): официальное Rust-ядро Signal (Double Ratchet + X3DH).
# Не на crates.io — пин на git-тег. Обновлять осознанно (security-критично).
libsignal-protocol = { git = "https://github.com/signalapp/libsignal", tag = "v0.96.4" }
rand = "0.8"

[features]
custom-protocol = ["tauri/custom-protocol"]
